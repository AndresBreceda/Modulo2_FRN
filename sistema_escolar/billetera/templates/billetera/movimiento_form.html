{% extends "base.html" %}

{% block title %}
Nuevo movimiento
{% endblock %}

{% block page_title %}
Registrar movimiento
{% endblock %}

{% block content %}

<div class="container-fluid">

    <div class="row justify-content-center">

        <div class="col-md-7 col-lg-6">

            <div class="card shadow">

                <div class="card-header bg-primary text-white">

                    <h4 class="mb-0">

                        <i class="bi bi-wallet2"></i>

                        Nuevo movimiento

                    </h4>

                </div>

                <div class="card-body">

                    <form method="post">

                        {% csrf_token %}

                        <div class="mb-3">

                            <label class="form-label">

                                Concepto

                            </label>

                            {{ form.concepto }}

                        </div>

                        <div class="mb-3">

                            <label class="form-label">

                                Monto

                            </label>

                            {{ form.monto }}

                        </div>

                        <div class="mb-4">

                            <label class="form-label">

                                Tipo

                            </label>

                            {{ form.tipo }}

                        </div>

                        <div class="d-flex justify-content-between">

                            <a href="{% url 'billetera_list' %}"
                               class="btn btn-secondary">

                                <i class="bi bi-arrow-left"></i>

                                Regresar

                            </a>

                            <button type="submit"
                                    class="btn btn-primary">

                                <i class="bi bi-check-circle-fill"></i>

                                Guardar

                            </button>

                        </div>

                    </form>

                </div>

            </div>

        </div>

    </div>

</div>

{% endblock %}
