{% extends 'firmar_documentos/base.html' %}

{% block contenido %}

<div class="stats">
    <div class="stat-card">
        <div class="icon-box">▦</div>
        <div>
            <p>Total Blocks</p>
            <h2>{{ total_bloques }}</h2>
        </div>
    </div>

    <div class="stat-card">
        <div class="icon-box">▤</div>
        <div>
            <p>Documents Signed</p>
            <h2>{{ documentos_firmados }}</h2>
        </div>
    </div>

    <div class="stat-card">
        <div class="icon-box">✓</div>
        <div>
            <p>Chain Status</p>
            <h2 class="green">Immutable & Valid</h2>
        </div>
    </div>
</div>

<div class="grid-main">

    <div class="panel panel-glow">
        <h2 class="panel-title">🛡 Sign Document</h2>
        <div class="line"></div>

        <form method="POST">
            {% csrf_token %}

            <label>Document Title</label>
            <input type="text" name="titulo" placeholder="e.g. Non-Disclosure Agreement" required>

            <label>Content payload</label>
            <textarea name="contenido" rows="8" placeholder="Enter document text to be cryptographically signed..."></textarea>

            <button class="btn" type="submit">🛡 Sign & Append to Chain</button>
        </form>
    </div>

    <div>
        <h2 class="section-title">⌁ Live Blockchain</h2>

        <a href="{% url 'firmar_documentos_firma' %}" class="btn btn-outline">Ver cadena completa ↗</a>
    </div>

</div>

{% endblock %}
